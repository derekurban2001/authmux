version: 2

project_name: profilex

before:
  hooks:
    - go mod tidy

builds:
  - id: profilex
    main: .
    binary: profilex
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/derekurban/profilex-cli/internal/cli.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: profilex
    ids:
      - profilex
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
